apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: potencia-sfp
  namespace: whitecicd
spec:
  generators:
  - list:
      elements:
      - site: barracas
      - site: cuyo
      - site: republica
  template:
    metadata:
      name: potencia-sfp-{{ site }}
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: operaciones-red-cloud
      source:
        repoURL: https://whitecicd-tt.cuyows.tcloud.ar/operaciones-red-cloud/potencia-sfp-prometheus.git
        targetRevision: HEAD
        path: deploy
        helm:
          valueFiles:
          - values-{{ site }}.yaml
      destination:
        server: https://api.wcr-operaciones.cuyows.tcloud.ar:6443
        namespace: power-metrics-dell
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
