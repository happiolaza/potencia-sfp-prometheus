apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "potencia-site.fullname" . }}
  labels:
{{ include "potencia-site.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
{{ include "potencia-site.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
{{ include "potencia-site.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "potencia-site.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: {{ include "potencia-site.name" . }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          image: "{{ include "potencia-site.imageRepository" . }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: SWITCH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret | default (printf "%s-ssh" (include "potencia-site.fullname" .)) }}
                  key: username
            - name: SWITCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret | default (printf "%s-ssh" (include "potencia-site.fullname" .)) }}
                  key: password
          {{- if .Values.probes.enabled }}
          livenessProbe:
            httpGet:
              path: /metrics
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /metrics
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- end }}
          resources: {{ toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config-volume
              mountPath: /app/element.ssh
              subPath: element.ssh
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config-volume
          configMap:
            name: {{ include "potencia-site.fullname" . }}
            defaultMode: 420
        - name: tmp
          emptyDir: {}
