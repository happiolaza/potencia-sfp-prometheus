apiVersion: v1
kind: Service
metadata:
  name: {{ include "potencia-site.fullname" . }}
  labels:
{{ include "potencia-site.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
{{ include "potencia-site.selectorLabels" . | nindent 4 }}
