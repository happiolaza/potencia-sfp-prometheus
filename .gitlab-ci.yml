stages:
  - build
  - deploy

variables:
  HARBOR_REGISTRY: whiteregistry.cuyows.tcloud.ar
  HARBOR_PROJECT: whitecicd-pipeline
  DESTINATION_PROJECT: power-metrics
  HARBOR_USER: admin
  HARBOR_PASSWORD: TefAr123
  GIT_STRATEGY: none

build-ssh:
  stage: build
  variables:
    IMAGE_NAME: potencia-sfp-prometehus-dell-ssh
    APP_CONTEXT: app-ssh
  rules:
    - changes:
        - app-ssh/**/*
        - .gitlab-ci.yml
        - scripts/build.sh
      when: always
    - when: never
  image:
    name: $HARBOR_REGISTRY/$HARBOR_PROJECT/kaniko-git:debug
    entrypoint: [""]
  before_script:
    - git clone https://gitlab+deploy-token-3:${GIT_DEPLOY_TOKEN}@whitecicd-tt.cuyows.tcloud.ar/operaciones-red-cloud/potencia-sfp-prometheus.git .
  script:
    - sh scripts/build.sh

build-api:
  stage: build
  variables:
    IMAGE_NAME: potencia-sfp-prometheus-dell-api
    APP_CONTEXT: app-api
  rules:
    - changes:
        - app-api/**/*
        - .gitlab-ci.yml
        - scripts/build.sh
      when: always
    - when: never
  image:
    name: $HARBOR_REGISTRY/$HARBOR_PROJECT/kaniko-git:debug
    entrypoint: [""]
  before_script:
    - git clone https://gitlab+deploy-token-3:${GIT_DEPLOY_TOKEN}@whitecicd-tt.cuyows.tcloud.ar/operaciones-red-cloud/potencia-sfp-prometheus.git .
  script:
    - sh scripts/build.sh

update-tag:
  stage: deploy
  image:
    name: $HARBOR_REGISTRY/utils/curl:latest
    entrypoint: [""]
  rules:
    - if: $CI_COMMIT_BRANCH =~ /^(main|cicd-fix)$/
      when: always
    - when: never
  script:
    - |
      # fetch current values.yaml via GitLab API
      mkdir -p deploy
      curl -sk --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        "https://whitecicd-tt.cuyows.tcloud.ar/api/v4/projects/${CI_PROJECT_ID}/repository/files/deploy%2Fvalues.yaml/raw?ref=${CI_COMMIT_BRANCH}" \
        -o deploy/values.yaml
      # update image tag and push back via GitLab API
      sed "s|^  tag: .*|  tag: ${CI_COMMIT_SHORT_SHA}|" deploy/values.yaml | base64 | tr -d '\n' > /tmp/content.b64
      printf '{"branch":"%s","content":"%s","commit_message":"chore: update image tag to %s [skip ci]","encoding":"base64"}' \
        "${CI_COMMIT_BRANCH}" "$(cat /tmp/content.b64)" "${CI_COMMIT_SHORT_SHA}" > /tmp/body.json
      curl -sk -o /dev/null --request PUT \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --header "Content-Type: application/json" \
        --data @/tmp/body.json \
        "https://whitecicd-tt.cuyows.tcloud.ar/api/v4/projects/${CI_PROJECT_ID}/repository/files/deploy%2Fvalues.yaml"
