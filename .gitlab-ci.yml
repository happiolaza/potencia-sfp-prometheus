stages:
  - build
  - update-manifest

variables:
  HARBOR_REGISTRY: whiteregistry.cuyows.tcloud.ar
  HARBOR_PROJECT: whitecicd-pipeline
  DESTINATION_PROJECT: power-metrics
  IMAGE_NAME: potencia-sfp-prometehus-cm
  GIT_STRATEGY: none

build:
  stage: build
  image:
    name: $HARBOR_REGISTRY/$HARBOR_PROJECT/kaniko-git:debug
    entrypoint: [""]
  variables:
    DOCKER_CONFIG: /kaniko/.docker
  before_script:
    - mkdir -p $DOCKER_CONFIG
    - printf '{"auths":{"whiteregistry.cuyows.tcloud.ar":{"auth":"YWRtaW46VGVmQXIxMjM="}}}' > $DOCKER_CONFIG/config.json
    - git clone https://gitlab+deploy-token-1:${GIT_DEPLOY_TOKEN}@whitecicd-tt.cuyows.tcloud.ar/operaciones-red-cloud/potencia-sfp-prometheus.git .
  script:
    - /kaniko/executor
      --context ${CI_PROJECT_DIR}/app
      --dockerfile ${CI_PROJECT_DIR}/app/Dockerfile
      --skip-tls-verify-registry $HARBOR_REGISTRY
      --destination $HARBOR_REGISTRY/$DESTINATION_PROJECT/$IMAGE_NAME:$CI_COMMIT_SHORT_SHA
      --destination $HARBOR_REGISTRY/$DESTINATION_PROJECT/$IMAGE_NAME:latest

update-manifest:
  stage: update-manifest
  image:
    name: $HARBOR_REGISTRY/$HARBOR_PROJECT/kaniko-git:debug
    entrypoint: [""]
  needs: [build]
  before_script:
    - git clone https://gitlab+deploy-token-1:${GIT_DEPLOY_TOKEN}@whitecicd-tt.cuyows.tcloud.ar/operaciones-red-cloud/potencia-sfp-prometheus.git .
  script:
    - sed -i "s|^  tag: .*|  tag: $CI_COMMIT_SHORT_SHA|" deploy/values.yaml
    - git config user.name "GitLab CI"
    - git config user.email "ci@whitecicd"
    - git add deploy/values.yaml
    - git commit -m "chore: update image tag to $CI_COMMIT_SHORT_SHA [skip ci]"
    - git push https://gitlab+deploy-token-1:${GIT_DEPLOY_TOKEN}@whitecicd-tt.cuyows.tcloud.ar/operaciones-red-cloud/potencia-sfp-prometheus.git HEAD:main
